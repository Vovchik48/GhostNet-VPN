name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'  # более стабильная версия
          channel: 'stable'
      
      - name: Recreate Android project with valid name
        run: |
          rm -rf android
          flutter create --project-name ghostnet_vpn --platforms=android .
      
      - name: Fix Android SDK paths
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > android/local.properties
          echo "flutter.sdk=${{ env.FLUTTER_HOME }}" >> android/local.properties
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK (release)
        run: flutter build apk --release
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostnet-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
