name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      
      - name: Download Xray binary
        run: |
          wget https://github.com/XTLS/Xray-core/releases/download/v1.8.16/Xray-linux-64.zip
          unzip -o Xray-linux-64.zip
          mkdir -p assets
          mv xray assets/
          chmod +x assets/xray
      
      - name: Remove old Android folder and recreate
        run: |
          rm -rf android
          flutter create --project-name ghostnet_vpn --platforms=android .
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK (release)
        run: flutter build apk --release
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostnet-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
